<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Can I take you out? 🥺</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>

<body>
    <div id="surprise-overlay">
        <h2>I have a question for you...</h2>
        <button id="open-surprise-btn" onclick="openSurprise()"><span>Open me! 💌</span></button>
    </div>

    <div class="hearts-bg"></div>

    <div class="container" id="main-container">
        <h1 id="main-question">I really like you. Can I take you out on a date? 🥺</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif"
                alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <!-- Yes Container (Hidden initially) -->
    <div class="container yes-container" id="yes-container" style="display: none;">
        <h1 class="yes-title">Yay! I can't wait! 🎉</h1>
        <div class="gif-container">
            <img id="yes-cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating">
        </div>
        <p class="yes-message" id="final-msg">Now the most important question... What are we gonna do afterall?</p>
        <div class="options-menu" id="options-menu">
            <button class="food-btn" onclick="selectFood('Netflix and Pizza 🍕📺')">Netflix & Pizza 🍕</button>
            <button class="food-btn" onclick="selectFood('Cafe Hopping ☕🍰')">Cafe Hopping ☕</button>
            <button class="food-btn" onclick="selectFood('Nature Photography & a Shake 📸🥤')">Photo Walk & Shake
                📸</button>
        </div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="music/this_love taylor swift.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="analytics.js"></script>
    <script src="sensors.js"></script>
    <script src="context.js"></script>
    <script src="script.js"></script>
</body>

</html>
