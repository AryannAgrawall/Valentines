    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Shared-link preview (Open Graph) — absolute URLs for reliable previews
         on WhatsApp / iMessage / Facebook. -->

    <!-- Twitter / X large-image card -->
    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:description" content="I have a question for you...">
    <meta name="twitter:image" content="https://annoying-but-cute.vercel.app/og-image.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://media.tenor.com" crossorigin>
    <link rel="preconnect" href="https://media1.tenor.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "./vendor/three.module.js" } }
    </script>
    <script>
        // Decide the envelope mode BEFORE first paint so the flat envelope never
        // flashes before the 3D scene. env-3d → dark candlelit placeholder while
        // WebGL loads; env-flat → original flat envelope (reduced-motion/no WebGL).
        (function () {
            var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            var gl = false;
            try {
                var c = document.createElement('canvas');
                gl = !!(window.WebGLRenderingContext && (c.getContext('webgl') || c.getContext('experimental-webgl')));
            } catch (e) {}
            if (!reduce && gl) {
                document.documentElement.classList.add('env-3d');
                // Start fetching the (vendored) Three.js modules immediately — in
                // parallel with the rest of parsing — but only for visitors who
                // will actually run the 3D scene (not reduced-motion / no-WebGL).
                ['vendor/three.module.js', 'vendor/three.core.js'].forEach(function (href) {
                    var l = document.createElement('link');
                    l.rel = 'modulepreload';
                    l.href = href;
                    document.head.appendChild(l);
                });
            } else {
                document.documentElement.classList.add('env-flat');
            }
        })();
    </script>
</head>

<body>
    <div id="surprise-overlay">
        <canvas id="envelope-canvas" aria-hidden="true" tabindex="-1"></canvas>
        <h2>I have a question for you...</h2>
        <button id="open-surprise-btn" onclick="openSurprise()" aria-label="Open the letter"><span>Open me! 💌</span></button>
    </div>

    <div class="hearts-bg"></div>

    <div class="container" id="main-container">
        <!-- Move 3: handwritten greeting + the letter that types out, then the
             question + controls fade in. Greeting/body are filled by script.js. -->
        <p class="letter-greeting" id="letter-greeting" aria-hidden="true"></p>
        <p class="letter-body" id="letter-body"></p>

        <h1 id="main-question" class="stagger">Can I take you out on a date? 🥺</h1>

        <div class="gif-container stagger">
            <img id="cat-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif"
                alt="cute character">
        </div>

        <div class="buttons stagger">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <!-- Yes Container (Hidden initially) -->
    <div class="container yes-container" id="yes-container" style="display: none;">
        <h1 class="yes-title">Yay! I can't wait! 🎉</h1>
        <div class="gif-container">
            <img id="yes-cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating">
        </div>
        <p class="yes-message" id="final-msg">Now the most important question... What are we gonna do afterall?</p>
        <div class="options-menu" id="options-menu">
            <button class="food-btn" onclick="selectFood('Netflix and Pizza 🍕📺')">Netflix & Pizza 🍕</button>
            <button class="food-btn" onclick="selectFood('Cafe Hopping ☕🍰')">Cafe Hopping ☕</button>
            <button class="food-btn" onclick="selectFood('Nature Photography & a Shake 📸🥤')">Photo Walk & Shake
                📸</button>
        </div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="analytics.js"></script>
    <script src="sensors.js"></script>
    <script src="context.js"></script>
    <script src="script.js"></script>
    <script src="atmosphere.js"></script>
    <script src="vendor/gsap.min.js"></script>
    <script type="module" src="envelope3d.js"></script>
</body>

</html>
