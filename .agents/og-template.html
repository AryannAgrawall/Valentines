<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; }
  body {
    display:flex; align-items:center; justify-content:center;
    background-color:#160f1c;
    background-image:
      radial-gradient(circle at 18% 82%, rgba(224,96,126,0.18) 0%, transparent 42%),
      radial-gradient(circle at 82% 16%, rgba(232,180,143,0.14) 0%, transparent 42%),
      radial-gradient(ellipse 65% 60% at 50% 50%, rgba(232,180,143,0.12) 0%, transparent 70%),
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(8,4,12,0.6) 100%);
    font-family:'Nunito', sans-serif;
  }
  .card {
    position:relative;
    width:880px;
    text-align:center;
    padding:64px 72px;
    border-radius:28px;
    background:linear-gradient(160deg, rgba(58,40,70,0.72), rgba(33,22,42,0.85));
    border:1px solid rgba(255,180,160,0.20);
    box-shadow:0 30px 80px rgba(10,6,16,0.55), 0 0 140px rgba(224,96,126,0.14), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .kicker {
    font-family:'Caveat', cursive;
    font-size:34px; font-weight:700;
    color:#ffb3c1; letter-spacing:0.5px;
    margin-bottom:14px;
  }
  h1 {
    font-family:'Fraunces', serif;
    font-weight:900;
    font-size:74px; line-height:1.1;
    color:#ff8fa3;
    text-shadow:0 0 36px rgba(255,143,163,0.45);
  }
  .seal {
    margin-top:30px;
    font-size:46px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="kicker">I have a question for you…</div>
    <h1>Can I take you out<br>on a date? 🥺</h1>
    <div class="seal">💌</div>
  </div>
</body>
</html>
